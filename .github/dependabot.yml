version: 2
updates:
  # Python dependencies (uv lockfile + pyproject).
  - package-ecosystem: "uv"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      # Batch low-risk minor/patch bumps into a single PR. Major bumps stay
      # individual so they get reviewed on their own.
      python-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions versions used in workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      # One PR for all action-version bumps (CI-only, low risk).
      github-actions:
        patterns:
          - "*"
