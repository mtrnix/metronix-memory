name: CI Status Checks

on:
  pull_request:
  push:
    branches:
      - develop
      - main

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Create project virtualenv
        run: make setup

      - name: Install dependencies
        run: |
          .venv/bin/python -m pip install --upgrade pip

      - name: Run tests
        run: make test

  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Create project virtualenv
        run: make setup

      - name: Install dependencies
        run: |
          .venv/bin/python -m pip install --upgrade pip

      - name: Run lint
        run: make lint

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Create project virtualenv
        run: make setup

      - name: Install dependencies
        run: |
          .venv/bin/python -m pip install --upgrade pip

      - name: Run typecheck
        run: make typecheck
