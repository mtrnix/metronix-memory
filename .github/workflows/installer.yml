name: installer
on:
  pull_request:
    paths:
      - "install.sh"
      - "scripts/install-bootstrap.sh"
      - "tests/installer/test_bootstrap.sh"
      - ".github/workflows/installer.yml"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: shellcheck install.sh scripts/install-bootstrap.sh tests/installer/test_bootstrap.sh
      - name: bash syntax check
        run: bash -n install.sh scripts/install-bootstrap.sh tests/installer/test_bootstrap.sh
      - name: bootstrap behavior tests
        run: bash tests/installer/test_bootstrap.sh
