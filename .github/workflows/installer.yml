name: installer
on:
  pull_request:
    paths:
      - "install.sh"
      - ".github/workflows/installer.yml"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: shellcheck
        run: shellcheck install.sh
      - name: bash syntax check
        run: bash -n install.sh
