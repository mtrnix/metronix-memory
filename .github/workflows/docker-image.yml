name: Build CORE 

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Quick cleanup
      run: |
        sudo docker system prune -f
        sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost
        df -h
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver-opts: |
          env.BUILDKIT_STEP_LOG_MAX_SIZE=50000000
    
    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Determine branch name
      id: branch
      run: |
        BRANCH_NAME="${GITHUB_REF#refs/heads/}"
        SAFE_BRANCH_NAME=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9]/-/g')
        echo "tag=$SAFE_BRANCH_NAME" >> $GITHUB_OUTPUT
        echo "cache_tag=cache-${SAFE_BRANCH_NAME}" >> $GITHUB_OUTPUT
    
    - name: Build and push with intelligent caching
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/unix:metatroncore-${{ steps.branch.outputs.tag }}
        
        cache-from: |
          type=registry,ref=${{ secrets.DOCKER_USERNAME }}/unix:${{ steps.branch.outputs.cache_tag }}
          type=registry,ref=${{ secrets.DOCKER_USERNAME }}/unix:cache-main  # fallback на main
        
        cache-to: ${{ github.ref == 'refs/heads/main' && 'type=registry,ref='${{ secrets.DOCKER_USERNAME }}'/unix:cache-main,mode=max' || '' }}
        
        provenance: false
        sbom: false
        
        outputs: type=image,name=target,compression-level=6  
    
    - name: Cleanup old cache (main branch only)
      if: github.ref == 'refs/heads/main'
      run: |
        # Оставляем только последние 5 кэшей
        docker buildx prune --filter type=exec.cachemount --keep-storage=10GB -f
