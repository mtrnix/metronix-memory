name: Build CORE 

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest-4core
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Fast cleanup
      run: |
        sudo docker system prune -f
        sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost /opt/hostedtoolcache
        df -h
    
    - name: Set up Docker Buildx with optimizations
      uses: docker/setup-buildx-action@v3
      with:
        driver-opts: |
          env.BUILDKIT_STEP_LOG_MAX_SIZE=50000000
        buildkitd-flags: --debug
    
    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Determine branch name
      id: branch
      run: |
        BRANCH_NAME="${GITHUB_REF#refs/heads/}"
        echo "tag=$BRANCH_NAME" >> $GITHUB_OUTPUT
    
    - name: Pre-pull for cache
      run: |
        docker pull ${{ secrets.DOCKER_USERNAME }}/unix:metatroncore-${{ steps.branch.outputs.tag }} || true
        docker pull ${{ secrets.DOCKER_USERNAME }}/unix:metatroncore-cache || true
    
    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/unix:metatroncore-${{ steps.branch.outputs.tag }}
        cache-from: |
          type=registry,ref=${{ secrets.DOCKER_USERNAME }}/unix:metatroncore-cache
          type=gha
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/unix:metatroncore-cache,mode=max
        provenance: false
        sbom: false
