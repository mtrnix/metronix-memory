services:
  metatron:
    build: .
    container_name: metatron-app
    ports:
      - "${METATRON_PORT:-8000}:8000"
    env_file: .env
    environment:
      # Override hosts to Docker service names
      POSTGRES_HOST: postgres
      QDRANT_HOST: qdrant
      NEO4J_HOST: neo4j
      OLLAMA_HOST: http://ollama:11434
      BENCHMARKER_EMBEDDING_PROXY_URL: http://embedding-proxy:8001
      # Cache HuggingFace models to persistent volume (avoids re-download on restart)
      HF_HOME: /app/data/hf_cache
    volumes:
      - file_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - metatron_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 60s
      retries: 5
      start_period: 15s
    profiles: ["app"]
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: metatron-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-metatron}
      POSTGRES_USER: ${POSTGRES_USER:-metatron}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-metatron_dev}
    ports:
      - "${POSTGRES_PORT:-127.0.0.1:5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - metatron_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-metatron}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.16.1
    container_name: metatron-qdrant
    ports:
      - "${QDRANT_HTTP_PORT:-127.0.0.1:6333}:6333"
      - "${QDRANT_GRPC_PORT:-127.0.0.1:6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - metatron_network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: metatron-neo4j
    ports:
      - "${NEO4J_HTTP_PORT:-127.0.0.1:7474}:7474"
      - "${NEO4J_BOLT_PORT:-127.0.0.1:7687}:7687"
    environment:
      NEO4J_AUTH: "none"
    volumes:
      - neo4j_data:/data
    networks:
      - metatron_network
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell 'RETURN 1' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: metatron-ollama
    ports:
      - "${OLLAMA_PORT:-127.0.0.1:11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - metatron_network
    profiles: ["ollama"]
    restart: unless-stopped

  embedding-proxy:
    build: ./embedding_proxy
    container_name: metatron-embedding-proxy
    ports:
      - "8001:8001"
    environment:
      OLLAMA_HOST: ollama
      OLLAMA_PORT: "11434"
      OLLAMA_MODEL: ${OLLAMA_MODEL:-nomic-embed-text}
    depends_on:
      - ollama
    networks:
      - metatron_network
    profiles: ["benchmarker"]
    restart: unless-stopped

volumes:
  pg_data:
  qdrant_data:
  neo4j_data:
  ollama_data:
  file_data:

networks:
  metatron_network:
    driver: bridge
