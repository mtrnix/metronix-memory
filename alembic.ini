[alembic]
script_location = migrations
sqlalchemy.url = postgresql+asyncpg://metronix:metronix_dev@localhost:5432/metronix

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

# Root level used to be WARNING which silenced all INFO-level app logs
# after `fileConfig()` ran inside the API lifespan. INFO keeps migration
# progress visible during standalone `alembic upgrade` runs and matches
# the API's own `METRONIX_LOG_LEVEL` default.
[logger_root]
level = INFO
handlers = console

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
