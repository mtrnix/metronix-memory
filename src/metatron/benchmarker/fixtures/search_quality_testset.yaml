    expected_doc_labels:
      - "345669633"
      - "329351178"
    notes: "Cost Savings Analytics + FinOps Dashboard analytics pages"

  - id: "mix-04"
    text: "What benchmarks and metrics are used to evaluate MTRNIX?"
