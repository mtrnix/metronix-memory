version: "1.0"
description: >
  Search quality evaluation test set for MTRNIX workspace.
  16 queries across 5 intent categories with ground-truth doc_labels.
  doc_labels match the doc_label field in Qdrant payloads.
  Based on real MTRNIX workspace data as of 2026-03-25.

queries:
  # --- Category: execution/status-heavy (Jira primary) ---
  - id: "exec-01"
    text: "What is the status of MTRNIX-104?"
    category: "execution/status-heavy"
    expected_doc_labels:
      - "MTRNIX-104"
    notes: "Direct Jira key lookup — RBAC implementation ticket"

  - id: "exec-02"
    text: "What tasks are currently in progress?"
    category: "execution/status-heavy"
    expected_doc_labels:
      - "MTRNIX-116"
      - "MTRNIX-154"
      - "MTRNIX-54"
    notes: "Status-based query — should find In Progress tickets"

  - id: "exec-03"
    text: "What is MTRNIX-116?"
    category: "execution/status-heavy"
    expected_doc_labels:
      - "MTRNIX-116"
    notes: "Direct Jira key lookup — Build core OSS version"

  # --- Category: documentation-heavy (Confluence primary) ---
  - id: "doc-01"
    text: "What is Metatron?"
    category: "documentation-heavy"
    expected_doc_labels:
      - "285343747"
    notes: "Should find 'Metatron: A Unified Knowledge Fabric' confluence page"

  - id: "doc-02"
    text: "What are the coding standards and development rules?"
    category: "documentation-heavy"
    expected_doc_labels:
      - "266862595"
    notes: "Should find 'Development guide and rules' confluence page"

  - id: "doc-03"
    text: "What research has been done on graph databases?"
    category: "documentation-heavy"
    expected_doc_labels:
      - "314245121"
      - "MTRNIX-69"
    notes: "FalkorDB vs Memgraph evaluation + Ultra-fast Graph DB RnD ticket"

  # --- Category: user-file-heavy (uploads primary) ---
  - id: "file-01"
    text: "What does the Adobe 10K report say about revenue?"
    category: "user-file-heavy"
    expected_doc_labels:
      - "MTRNIX:user:ADOBE_2016_10K.pdf:2026-03-05T06:10:57.319819+00:00"
      - "MTRNIX:user:ADOBE_2017_10K.pdf:2026-03-05T06:13:59.837943+00:00"
    notes: "User-uploaded Adobe annual reports"

  - id: "file-02"
    text: "Tell me about Project Aurora"
    category: "user-file-heavy"
    expected_doc_labels:
      - "upload:test_upload.txt"
    notes: "User-uploaded Project Aurora technical summary"

  - id: "file-03"
    text: "What are the FP-Service model testing results?"
    category: "user-file-heavy"
    expected_doc_labels:
      - "244187137"
    notes: "FP-Service Model Testing Results confluence page"

  # --- Category: relationship-heavy (graph primary) ---
  - id: "rel-01"
    text: "How does RBAC relate to user-ingested documents?"
    category: "relationship-heavy"
    expected_doc_labels:
      - "MTRNIX-104"
      - "MTRNIX-154"
      - "345112578"
    notes: "RBAC ticket + RBAC for uploads ticket + RBAC Implementation Plan"

  - id: "rel-02"
    text: "What components does the MCP client interact with?"
    category: "relationship-heavy"
    expected_doc_labels:
      - "MTRNIX-125"
      - "MTRNIX-35"
    notes: "MCP Client implementation + MCP RnD research"

  - id: "rel-03"
    text: "How is Metatron used for customer experience intelligence?"
    category: "relationship-heavy"
    expected_doc_labels:
