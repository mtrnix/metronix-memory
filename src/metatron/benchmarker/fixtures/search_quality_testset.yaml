    text: "What is the RBAC implementation plan for Metatron?"
    category: "mixed"
    expected_doc_labels:
      - "345112578"
      - "MTRNIX-104"
    notes: "Confluence plan + Jira implementation ticket"

  - id: "mix-02"
    text: "What are the search enhancement improvements?"
