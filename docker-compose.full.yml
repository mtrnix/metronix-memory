# =============================================================================
# Metatron Full Stack — All services in Docker
# Usage: docker compose -f docker-compose.full.yml up --build
#
# External ports are offset to avoid conflicts with dev services:
#   PostgreSQL: 5433, Qdrant: 6335, Neo4j: 7475/7688,
#   Ollama: 11435, API: 8001, UI: 3001
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Databases
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: metatron-full-postgres
    environment:
      POSTGRES_DB: metatron
      POSTGRES_USER: metatron
      POSTGRES_PASSWORD: metatron_dev
    ports:
      - "5433:5432"
    volumes:
      - full_pg_data:/var/lib/postgresql/data
    networks:
      - metatron_full
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metatron"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.16.1
    container_name: metatron-full-qdrant
    ports:
      - "6335:6333"
      - "6336:6334"
    volumes:
      - full_qdrant_data:/qdrant/storage
    networks:
      - metatron_full
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo -e \"GET /healthz HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n\" > /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: metatron-full-neo4j
    ports:
      - "7475:7474"
      - "7688:7687"
    environment:
      NEO4J_AUTH: "none"
    volumes:
      - full_neo4j_data:/data
    networks:
      - metatron_full
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell 'RETURN 1' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis — cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: metatron-full-redis
    ports:
      - "6380:6379"
    volumes:
      - full_redis_data:/data
    networks:
      - metatron_full
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Ollama — embeddings (auto-pulls model on first start)
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: metatron-full-ollama
    ports:
      - "11435:11434"
    volumes:
      - full_ollama_data:/root/.ollama
    networks:
      - metatron_full
    environment:
      OLLAMA_EMBED_MODEL: nomic-embed-text
      OLLAMA_CHAT_MODEL: llama3.1:8b
    entrypoint: ["/bin/bash", "-c", "ollama serve & for i in $$(seq 1 30); do sleep 1; ollama list >/dev/null 2>&1 && break; done; ollama pull $$OLLAMA_EMBED_MODEL; [ -n \"$$OLLAMA_CHAT_MODEL\" ] && ollama pull $$OLLAMA_CHAT_MODEL; wait"]
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/11434 && exec 3>&-'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # SPLADE sparse vector microservice
  # ---------------------------------------------------------------------------
  splade:
    build: services/splade
    container_name: metatron-full-splade
    ports:
      - "8080:8080"
    networks:
      - metatron_full
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8080/health').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Metatron Core API
  # ---------------------------------------------------------------------------
  metatron-core:
    build: .
    container_name: metatron-full-api
    ports:
      - "8001:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: metatron
      POSTGRES_USER: metatron
      POSTGRES_PASSWORD: metatron_dev
      QDRANT_HOST: qdrant
      NEO4J_HOST: neo4j
      OLLAMA_HOST: http://ollama:11434
      LLM_PROVIDER: ollama
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      SPLADE_SERVICE_URL: http://splade:8080
    volumes:
      - full_file_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      ollama:
        condition: service_healthy
      splade:
        condition: service_healthy
    networks:
      - metatron_full
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Metatron UI (requires separate metatronui repo next to metatroncore)
  # Uncomment to include UI in the stack:
  #   docker compose -f docker-compose.full.yml up --build
  # ---------------------------------------------------------------------------
  # metatron-ui:
  #   build:
  #     context: ../metatronui
  #     dockerfile: Dockerfile
  #   container_name: metatron-full-ui
  #   ports:
  #     - "3001:3000"
  #   depends_on:
  #     metatron-core:
  #       condition: service_healthy
  #   networks:
  #     - metatron_full
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl -sf http://localhost:3000/ || exit 1"]
  #     interval: 10s
  #     timeout: 3s
  #     retries: 3
  #   restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Embedding proxy — benchmarker support
  # ---------------------------------------------------------------------------
  embedding-proxy:
    build: ./embedding_proxy
    container_name: metatron-full-embedding-proxy
    ports:
      - "8002:8001"
    environment:
      OLLAMA_HOST: ollama
      OLLAMA_PORT: "11434"
      OLLAMA_MODEL: ${OLLAMA_MODEL:-nomic-embed-text}
    depends_on:
      - ollama
    networks:
      - metatron_full
    profiles: ["benchmarker"]
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Open WebUI — user-facing chat interface (OpenAI-compat connection to Metatron)
  # Usage: docker compose -f docker-compose.full.yml --profile openwebui up
  # Access: http://localhost:3080
  # Metatron connection is pre-configured via OPENAI_API_BASE_URL.
  # ---------------------------------------------------------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: metatron-full-openwebui
    ports:
      - "${OPENWEBUI_PORT:-3080}:8080"
    volumes:
      - full_openwebui_data:/app/backend/data
    environment:
      WEBUI_AUTH: "false"
      OPENAI_API_BASE_URL: "http://metatron-core:8000/v1"
      OPENAI_API_KEY: "${METATRON_OPENAI_COMPAT_KEY:-metatron}"
    depends_on:
      metatron-core:
        condition: service_healthy
    networks:
      - metatron_full
    profiles: ["openwebui"]
    restart: unless-stopped

volumes:
  full_pg_data:
  full_qdrant_data:
  full_neo4j_data:
  full_redis_data:
  full_ollama_data:
  full_file_data:
  full_openwebui_data:

networks:
  metatron_full:
    driver: bridge
