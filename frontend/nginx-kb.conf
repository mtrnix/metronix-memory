server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS — paired with $upstream in proxy_pass below to
    # force nginx to re-resolve metronix-core's IP on each request (with a 10s
    # cache). Without this, nginx resolves once at startup and caches forever,
    # so redeploying only the API rotates its container IP and leaves nginx
    # talking to the dead one → 502 Connection refused.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # SPA fallback — React Router handles client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy
    location /api {
        # Append trailing slash to collection endpoints so FastAPI doesn't 307
        rewrite ^(/api/v1/(?!upload)[a-z0-9_-]+)$ $1/ last;

        set $upstream metronix-core;
        proxy_pass http://$upstream:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
    }

    location ~ ^/(health|ready|metrics) {
        set $upstream metronix-core;
        proxy_pass http://$upstream:8000;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;
}
